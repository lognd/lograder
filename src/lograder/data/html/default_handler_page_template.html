<!doctype html>

<!-- This is the template used to generate the cards for `lograder.output.handlers.HTMLHandler` -->

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}}</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111827;
      --card: #0f172a;
      --border: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.60);
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }
    .container {
      height: calc(100vh - 57px);
      overflow-y: auto;
      padding: 16px;
    }
    .card {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 14px;
      padding: 12px 12px;
      margin: 0 0 12px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .content pre {
      margin: 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
      line-height: 1.25;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <header><strong>{{title}}</strong></header>
  <div class="container">
    {{cards}}
  </div>
</body>
</html>
